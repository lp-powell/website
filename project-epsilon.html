<!DOCTYPE html PUBLIC "-//IETF//DTD HTML 2.0//EN">
<html>
<head>
  <meta charset="windows-1252">
  <title>Lucas Powell - Fusor</title>
  <style>
    body {
      font-family: Times New Roman, serif;
      background-image: url("images/steel.jpg");
      background-repeat: repeat;
      color: #000000;
    }
    a:link    { color: #0000ff; }
    a:visited { color: #880000; }
    a:hover   { color: #0000cc; }

    table.nav {
      border: 1px solid #000080;
      border-collapse: collapse;
      background-color: #ffffe1;
      float: left;
      margin-right: 14px;
      margin-bottom: 8px;
      width: 150px;
    }
    table.nav td {
      border: 1px solid #000080;
      padding: 3px 6px;
    }
    td.nav-header {
      background-color: #0033cc;
      text-align: center;
    }
    td.nav-subject {
      background-color: #e6ffff;
      text-align: center;
    }
    td.nav-links {
      background-color: #ffffd7;
      text-align: left;
    }
    td.nav-links a {
      font-family: Arial, sans-serif;
      font-size: small;
      display: block;
      margin-bottom: 1px;
    }

    .rbline {
      height: 4px;
      background: linear-gradient(90deg, #001f5b, #0044cc, #4d9fff, #ffffff, #4d9fff, #0044cc, #001f5b);
      border: none;
      width: 540px;
      max-width: 100%;
      margin: 12px auto;
      display: block;
    }

    .main-content { overflow: hidden; }

    /* Project summary table */
    table.project {
      border: 1px solid #000080;
      border-collapse: collapse;
      background-color: #ffffe1;
      width: 95%;
      margin-bottom: 18px;
    }
    table.project td {
      border: 1px solid #000080;
      padding: 4px 8px;
      font-size: small;
      font-family: Arial, sans-serif;
    }
    td.project-header {
      background-color: #0033cc;
      color: #ffffff;
      font-weight: bold;
      font-size: small;
      font-family: Arial, sans-serif;
    }
    td.project-label {
      background-color: #e6ffff;
      font-weight: bold;
      width: 140px;
    }
    td.project-value {
      background-color: #ffffd7;
    }

    /* Image caption */
    p.caption {
      font-size: small;
      font-family: Arial, sans-serif;
      color: #333333;
      margin-top: 2px;
    }
  </style>
</head>

<body>

<!-- ══════════════════════════════════════
     SIDEBAR — replace with fetch nav.html
     if you have that set up
     ══════════════════════════════════════ -->
<div id="nav"></div>
<script>
  fetch("nav.html").then(r => r.text()).then(h => document.getElementById("nav").innerHTML = h);
</script>


<!-- ══════════════════════════════════════
     MAIN CONTENT
     ══════════════════════════════════════ -->
<div class="main-content">

  <p align="center">
    <font color="#0000ff" face="Arial" size="6"><b><i>Fusor</i></b></font><br>
    <font face="Arial" size="4">Farnsworth Nuclear Fusor Project</font>
  </p>

  <hr class="rbline">


  <!-- Background -->
  <p><b>BACKGROUND</b>.... This page and this porject are still being worked on</p>

   <p align="center"><img src="images/fus.jpg" width="600"></p>

  <hr class="rbline">


  <p align="center">
    
    Last Updated:
    <script>document.write(new Date().toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'numeric'}));</script>
    <br>End of Page
    <img src="images/lpBottom.png" width="100">
  </p>

</div>

</body>
</html>
